<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  width: 400px;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  font-size: 13px;
  color: #0f0f0f;
  background: #fff;
}

/* ── 顶栏 ── */
.header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  background: #cc0000;
  color: white;
}
.header-title { font-size: 14px; font-weight: 600; }

/* ── 视频信息 ── */
.video-info {
  display: flex;
  gap: 10px;
  padding: 12px 14px;
  border-bottom: 1px solid #f0f0f0;
  background: #fafafa;
}
.thumbnail {
  width: 96px; height: 54px;
  object-fit: cover;
  border-radius: 4px;
  background: #ddd;
  flex-shrink: 0;
}
.video-meta { flex: 1; min-width: 0; }
.video-title {
  font-size: 12px;
  font-weight: 500;
  line-height: 1.45;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.video-duration { font-size: 11px; color: #777; margin-top: 4px; }

/* ── 区块 ── */
.section { padding: 10px 14px; border-bottom: 1px solid #f0f0f0; }
.section-label {
  font-size: 11px;
  font-weight: 600;
  color: #606060;
  text-transform: uppercase;
  letter-spacing: 0.3px;
  margin-bottom: 7px;
}

/* ── 格式选择 ── */
select {
  width: 100%;
  padding: 7px 10px;
  border: 1px solid #d9d9d9;
  border-radius: 6px;
  font-size: 13px;
  cursor: pointer;
  background: white;
  outline: none;
}
select:focus { border-color: #cc0000; }

/* ── 字幕列表 ── */
.sub-list {
  border: 1px solid #e8e8e8;
  border-radius: 6px;
  overflow: hidden;
}
.sub-group-label {
  font-size: 10px;
  font-weight: 600;
  color: #888;
  text-transform: uppercase;
  padding: 5px 10px 3px;
  background: #f8f8f8;
  border-bottom: 1px solid #eee;
}
.sub-item {
  display: flex;
  align-items: center;
  padding: 6px 10px;
  gap: 8px;
  cursor: pointer;
  border-bottom: 1px solid #f3f3f3;
  transition: background .1s;
  user-select: none;
}
.sub-item:last-child { border-bottom: none; }
.sub-item:hover { background: #f9f9f9; }
.sub-item input[type="checkbox"] {
  width: 14px; height: 14px;
  cursor: pointer;
  accent-color: #cc0000;
  flex-shrink: 0;
}
.sub-lang-name { font-size: 13px; font-weight: 500; }
.sub-lang-code { font-size: 11px; color: #999; }
.sub-badge {
  font-size: 10px;
  padding: 1px 5px;
  border-radius: 3px;
  margin-left: auto;
  flex-shrink: 0;
}
.sub-badge.auto   { background: #f0f0f0; color: #666; }
.sub-badge.manual { background: #e8f5e9; color: #2e7d32; }

.show-more-btn {
  width: 100%;
  margin-top: 6px;
  padding: 6px;
  font-size: 12px;
  color: #065fd4;
  background: none;
  border: 1px dashed #ccc;
  border-radius: 6px;
  cursor: pointer;
}
.show-more-btn:hover { background: #f0f7ff; }

/* ── 底部 ── */
.footer { padding: 10px 14px 12px; }
.download-btn {
  width: 100%;
  padding: 10px;
  background: #cc0000;
  color: white;
  border: none;
  border-radius: 6px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: background .15s, transform .1s;
}
.download-btn:hover:not(:disabled) { background: #b00000; }
.download-btn:active:not(:disabled) { transform: scale(0.98); }
.download-btn:disabled { background: #bbb; cursor: not-allowed; }
.status-text {
  text-align: center;
  font-size: 12px;
  color: #555;
  margin-top: 7px;
  min-height: 16px;
  line-height: 1.5;
}
.status-text.success { color: #2e7d32; font-weight: 500; }
.status-text.error   { color: #c62828; }

/* ── 加载 ── */
.loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 36px 20px;
  gap: 12px;
  color: #666;
  font-size: 13px;
  text-align: center;
  line-height: 1.6;
}
.spinner {
  width: 28px; height: 28px;
  border: 3px solid #eee;
  border-top-color: #cc0000;
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── 错误 ── */
.error-screen {
  padding: 24px 18px;
  text-align: center;
}
.error-icon  { font-size: 36px; margin-bottom: 10px; }
.error-title { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
.error-detail { font-size: 12px; color: #666; line-height: 1.6; }
.code-block {
  display: inline-block;
  background: #f5f5f5;
  padding: 8px 12px;
  border-radius: 6px;
  font-family: 'SF Mono', 'Monaco', monospace;
  font-size: 11px;
  margin-top: 10px;
  text-align: left;
  border: 1px solid #e0e0e0;
  word-break: break-all;
}
</style>
</head>
<body>
  <div class="header">
    <span>⬇</span>
    <span class="header-title">yt-dlp 下载器</span>
  </div>
  <div id="root"></div>
  <script src="popup.js"></script>
</body>
</html>
